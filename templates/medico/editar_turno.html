{% extends 'base.html' %}
{% block title %}Editar Turno — TurnoSalud{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">

  <div class="flex items-center gap-3 mb-8">
    <a href="{{ url_for('medico_turnos') }}"
       class="text-gray-400 hover:text-gray-600 transition-colors p-1">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Editar turno</h1>
      <p class="text-sm text-gray-500 mt-0.5">Modificá la fecha u horario</p>
    </div>
  </div>

  <div class="bg-white border border-gray-200 rounded-2xl p-7">
    <form method="POST" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha</label>
        <input type="date" name="fecha" required
               value="{{ turno.fecha }}"
               min="{{ tomorrow }}"
               class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Hora inicio</label>
          <input type="time" name="hora_inicio" required
                 value="{{ turno.hora_inicio }}"
                 class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Hora fin</label>
          <input type="time" name="hora_fin" required
                 value="{{ turno.hora_fin }}"
                 class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <!-- Estado info (read-only) -->
      <div class="bg-gray-50 rounded-xl px-4 py-3 flex items-center justify-between">
        <span class="text-sm text-gray-500">Estado actual</span>
        <span class="px-2.5 py-0.5 rounded-full text-xs font-medium
          {% if turno.estado == 'disponible'    %}bg-green-100 text-green-700
          {% else                               %}bg-gray-100  text-gray-400{% endif %}">
          {% if turno.estado == 'disponible' %}Disponible{% else %}Deshabilitado{% endif %}
        </span>
      </div>

      <div class="flex gap-3 pt-1">
        <a href="{{ url_for('medico_turnos') }}"
           class="flex-1 py-2.5 text-center bg-white border border-gray-300 hover:bg-gray-50
                  text-gray-700 text-sm font-medium rounded-xl transition-colors">
          Cancelar
        </a>
        <button type="submit"
                class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-xl transition-colors">
          Guardar cambios
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
