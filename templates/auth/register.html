{% extends 'base.html' %}
{% block title %}Registrarse — TurnoSalud{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto">

  <div class="text-center mb-7">
    <h1 class="text-2xl font-bold text-gray-900">Crear cuenta</h1>
    <p class="text-sm text-gray-500 mt-1">Registrate para reservar turnos</p>
  </div>

  <div class="bg-white border border-gray-200 rounded-2xl p-7">
    <form method="POST" class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input type="text" id="nombre" name="nombre" required
                 class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                        placeholder-gray-300"
                 placeholder="Juan">
        </div>
        <div>
          <label for="apellido" class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
          <input type="text" id="apellido" name="apellido" required
                 class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                        placeholder-gray-300"
                 placeholder="Pérez">
        </div>
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="email" name="email" required
               class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                      placeholder-gray-300"
               placeholder="tu@email.com">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input type="password" id="password" name="password" required
               class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                      placeholder-gray-300"
               placeholder="Mínimo 6 caracteres">
      </div>
      <div>
        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirmar contraseña</label>
        <input type="password" id="confirm_password" name="confirm_password" required
               class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                      placeholder-gray-300"
               placeholder="Repetí la contraseña">
      </div>
      <button type="submit"
              class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl text-sm transition-colors">
        Crear cuenta
      </button>
    </form>

    <p class="mt-5 text-center text-sm text-gray-500">
      ¿Ya tenés cuenta?
      <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline font-medium">Iniciar sesión</a>
    </p>
  </div>

</div>
{% endblock %}
