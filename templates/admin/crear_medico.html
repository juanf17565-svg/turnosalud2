{% extends 'base.html' %}
{% block title %}Nuevo Médico — Admin{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">

  <div class="flex items-center gap-3 mb-8">
    <a href="{{ url_for('admin_medicos') }}"
       class="text-gray-400 hover:text-gray-600 transition-colors p-1">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Nuevo médico</h1>
      <p class="text-sm text-gray-500 mt-0.5">Creá la cuenta para un especialista</p>
    </div>
  </div>

  <div class="bg-white border border-gray-200 rounded-2xl p-7">
    <form method="POST" class="space-y-5">

      <!-- Datos personales -->
      <div>
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Datos personales</p>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
            <input type="text" name="nombre" required
                   class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Carlos">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
            <input type="text" name="apellido" required
                   class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Rodríguez">
          </div>
        </div>
      </div>

      <!-- Credenciales -->
      <div>
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Credenciales de acceso</p>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required
                   class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="doctor@clinica.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña inicial</label>
            <input type="text" name="password" required
                   class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono"
                   placeholder="Contraseña temporal">
            <p class="text-xs text-gray-400 mt-1">El médico puede cambiarla después.</p>
          </div>
        </div>
      </div>

      <!-- Datos profesionales -->
      <div>
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Datos profesionales</p>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Especialidad <span class="text-red-400">*</span></label>
            <input type="text" name="especialidad" required
                   class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Cardiología">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Matrícula <span class="text-gray-400 font-normal">(opcional)</span>
            </label>
            <input type="text" name="matricula"
                   class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="MN 12345">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Descripción <span class="text-gray-400 font-normal">(opcional)</span>
            </label>
            <textarea name="descripcion" rows="3"
                      class="block w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm
                             focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                      placeholder="Breve descripción del médico y su experiencia..."></textarea>
          </div>
        </div>
      </div>

      <div class="flex gap-3 pt-1">
        <a href="{{ url_for('admin_medicos') }}"
           class="flex-1 py-2.5 text-center bg-white border border-gray-300 hover:bg-gray-50
                  text-gray-700 text-sm font-medium rounded-xl transition-colors">
          Cancelar
        </a>
        <button type="submit"
                class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-xl transition-colors">
          Crear cuenta
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
